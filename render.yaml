services:
  - type: web
    name: company-intelligence-server
    env: node
    buildCommand: npm install && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: node server/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: company-intel-db
          property: connectionString
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: WEB_SEARCH_PROVIDER
        value: tavily
      - key: TAVILY_API_KEY
        sync: false
      - key: PORT
        value: "3001"

  - type: web
    name: company-intelligence-client
    env: static
    buildCommand: npm install && npm run build --workspace=client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://company-intelligence-server.onrender.com

databases:
  - name: company-intel-db
    databaseName: company_intel
    user: user
